<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Toko - SPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-8 bg-gray-50 min-h-screen">
    <div class="max-w-6xl mx-auto space-y-10">

        <!-- Daftar Barang -->
        <div>
            <div class="flex flex-col sm:flex-row justify-between items-center mb-8 gap-4">
                <h1 class="text-3xl font-bold text-gray-800">Daftar Barang <span
                        class="text-lg font-normal text-gray-500">(Tampilan Tabel)</span></h1>
                <a href="index_card.html"
                    class="px-4 py-2 bg-white text-gray-700 rounded-lg shadow hover:bg-gray-50 transition-colors text-sm font-medium border border-gray-200">
                    Lihat Tampilan Card &rarr;
                </a>
            </div>

            <div class="bg-white rounded-lg shadow-md overflow-hidden border border-gray-200">
                <table class="w-full">
                    <thead class="bg-orange-300 text-gray-800">
                        <tr>
                            <th class="py-4 px-4 text-left font-semibold">No.</th>
                            <th class="py-4 px-2 text-left font-semibold">Nama</th>
                            <th class="py-4 px-2 text-center font-semibold">Harga</th>
                            <th class="py-4 px-2 text-center font-semibold">Stok</th>
                            <th class="py-4 px-2 text-center font-semibold">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="table-barang">
                        <!-- Data akan diisi oleh JavaScript -->
                        <tr>
                            <td colspan="4" class="text-center py-10 text-gray-500">Memuat data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <!-- Form Tambah Barang -->
        <div class="bg-white rounded-lg shadow-md border border-gray-200 p-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Tambah Barang Baru</h2>
            <form id="form-barang" class="space-y-4">
                <div>
                    <label for="nama_barang" class="block text-sm font-medium text-gray-700">Nama Barang</label>
                    <input type="text" id="nama_barang" name="nama_barang" required
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-orange-400 focus:ring focus:ring-orange-200 focus:ring-opacity-50">
                </div>

                <div>
                    <label for="harga" class="block text-sm font-medium text-gray-700">Harga</label>
                    <input type="number" id="harga" name="harga" required
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-orange-400 focus:ring focus:ring-orange-200 focus:ring-opacity-50">
                </div>

                <div>
                    <label for="stok" class="block text-sm font-medium text-gray-700">Stok</label>
                    <input type="number" id="stok" name="stok" required
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-orange-400 focus:ring focus:ring-orange-200 focus:ring-opacity-50">
                </div>

                <button type="submit"
                    class="px-4 py-2 bg-orange-400 text-white rounded-md shadow hover:bg-orange-500 transition-colors font-medium">
                    Simpan
                </button>
            </form>
        </div>
    </div>

    <!-- Modal Edit Barang -->
    <div id="modal-edit" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-md border border-gray-200 p-6 w-full max-w-md mx-4">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Ubah Data Barang</h2>
            <form id="form-edit-barang" class="space-y-4">
                <input type="hidden" id="edit_id" name="id">
                <div>
                    <label for="edit_nama_barang" class="block text-sm font-medium text-gray-700">Nama Barang</label>
                    <input type="text" id="edit_nama_barang" name="nama_barang" required
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-orange-400 focus:ring focus:ring-orange-200 focus:ring-opacity-50">
                </div>

                <div>
                    <label for="edit_harga" class="block text-sm font-medium text-gray-700">Harga</label>
                    <input type="number" id="edit_harga" name="harga" required
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-orange-400 focus:ring focus:ring-orange-200 focus:ring-opacity-50">
                </div>

                <div>
                    <label for="edit_stok" class="block text-sm font-medium text-gray-700">Stok</label>
                    <input type="number" id="edit_stok" name="stok" required
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-orange-400 focus:ring focus:ring-orange-200 focus:ring-opacity-50">
                </div>

                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" onclick="tutupModalEdit()"
                        class="px-4 py-2 bg-gray-100 text-gray-700 rounded-md shadow-sm hover:bg-gray-200 transition-colors font-medium">
                        Batal
                    </button>
                    <button type="submit"
                        class="px-4 py-2 bg-blue-500 text-white rounded-md shadow hover:bg-blue-600 transition-colors font-medium">
                        Simpan
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Script JavaScript -->
    <script src="app.js?v=3"></script>
</body>

</html>
